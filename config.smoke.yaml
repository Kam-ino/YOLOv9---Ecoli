# Smoke-test config — uses the auto-downloadable Ultralytics yolov9c.pt
# (COCO 80-class, NOT trained on E. coli) to verify the pipeline end-to-end.
# Real deployment uses config.yaml with a fine-tuned model.

model:
  weights: models/yolov9c.pt
  device: cpu               # CPU smoke test — no CUDA torch installed here
  imgsz: 640
  conf_threshold: 0.25
  iou_threshold: 0.45

capture:
  # Source is overridden via --source on the command line.
  source: 0
  width: 640
  height: 640
  fps: 30

preprocessing:
  apply_clahe: true
  clahe_clip_limit: 2.0
  clahe_tile_grid_size: 8

# Pretrained yolov9c.pt knows COCO classes — listing the ones we'd
# expect to maybe trigger on a synthetic test image.
classes:
  - person
  - bicycle
  - car
  - motorcycle
  - airplane
  - bus
  - train
  - truck
  - boat
  - traffic light
  - fire hydrant
  - stop sign
  - parking meter
